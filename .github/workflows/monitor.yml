name: Altcoin Monitor 
 
on: 
  schedule: 
    - cron: '*/20 * * * *' 
  workflow_dispatch: 
 
jobs: 
  run-monitor: 
    runs-on: ubuntu-latest 
    permissions: 
      contents: write 
    steps: 
    - name: Repoyu Klonla 
      uses: actions/checkout@v4 
    - name: Python Kur 
      uses: actions/setup-python@v5 
      with: 
        python-version: '3.10' 
    - name: Kutphaneleri Yukle 
      run: | 
        python -m pip install --upgrade pip 
        pip install requests ccxt pandas 
    - name: Scripti Calistir 
      run: | 
        python altcoin_oi_funding_monitor_1.py 
    - name: Durumu Repoya Geri Kaydet 
      run: | 
        git config --global user.name 'github-actions[bot]' 
        git config --global user.email 'github-actions[bot]@users.noreply.github.com' 
        git add monitor_state/ || true 
        git diff --quiet ^&^& git diff --staged --quiet || (git commit -m "Oto-Guncelleme: Monitor Durumu" ^& git push)
