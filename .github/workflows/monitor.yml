name: Altcoin Monitor 
 
on: 
  schedule: 
    - cron: '*/20 * * * *' 
  workflow_dispatch: 
 
jobs: 
  run-monitor: 
    runs-on: ubuntu-latest 
    permissions: 
      contents: write 
    steps: 
    - name: Repoyu Klonla 
      uses: actions/checkout@v4 
    - name: Python Kur 
      uses: actions/setup-python@v5 
      with: 
        python-version: '3.10' 
    - name: Warp VPN Kur (Binance 451 Engeli Icin) 
      run: | 
        sudo apt-get update && sudo apt-get install -y curl 
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg 
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.minitor.d/cloudflare-warp.list 
        sudo apt-get update && sudo apt-get install -y cloudflare-warp 
        warp-cli --accept-tos registration new 
        warp-cli --accept-tos mode proxy 
        warp-cli --accept-tos connect 
    - name: Kutphaneleri Yukle 
      run: | 
        python -m pip install --upgrade pip 
        pip install requests ccxt pandas 
    - name: Scripti Calistir 
      run: | 
        export HTTP_PROXY="socks5://127.0.0.1:4000" 
        export HTTPS_PROXY="socks5://127.0.0.1:4000" 
        python altcoin_oi_funding_monitor_1.py 
    - name: Durumu Repoya Geri Kaydet 
      run: | 
        git config --global user.name 'github-actions[bot]' 
        git config --global user.email 'github-actions[bot]@users.noreply.github.com' 
        git add monitor_state/ || true 
        git diff --quiet ^&^& git diff --staged --quiet || (git commit -m "Oto-Guncelleme: Monitor Durumu" ^& git push)
