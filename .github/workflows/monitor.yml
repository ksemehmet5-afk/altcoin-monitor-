name: Altcoin Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: altcoin-monitor
  cancel-in-progress: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Email Ayarlarini Olustur
        env:
          EMAIL_CONFIG_JSON: ${{ secrets.EMAIL_CONFIG_JSON }}
        run: |
          echo "$EMAIL_CONFIG_JSON" > email_config.json
      - name: Scripti Calistir
        run: |
          python altcoin_oi_funding_monitor_1.py
      - name: Durumu Repoya Geri Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add monitor_state/ || true
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Oto-Guncelleme: Monitor Durumu"
            git pull --rebase origin main
            git push
          fi
